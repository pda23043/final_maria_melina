<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Cat's Shelf Adventure</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #ffe8c2, #8b5e34);
      color: #2b1709;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      color: #3b1f0f;
    }

    #story {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #library {
      width: 850px;
      height: 620px;
      margin: 20px auto;
      position: relative;
      background: linear-gradient(#d99b5f, #9c5f2e);
      border: 14px solid #5c2e12;
      border-radius: 25px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.45);
      overflow: hidden;
    }

    .side {
      position: absolute;
      top: 0;
      width: 45px;
      height: 100%;
      background: linear-gradient(90deg, #4b240e, #8b4a22);
      z-index: 2;
    }

    .left {
      left: 0;
    }

    .right {
      right: 0;
    }

    .shelf {
      position: absolute;
      left: 60px;
      width: 730px;
      height: 24px;
      background: linear-gradient(#8b4a22, #3b1c0b);
      border-radius: 8px;
      box-shadow: 0 8px 10px rgba(0,0,0,0.3);
      z-index: 3;
    }

    .game-card {
      position: absolute;
      left: 95px;
      width: 260px;
      height: 72px;
      background: rgba(255,255,255,0.75);
      border: 3px solid #5c2e12;
      border-radius: 16px;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-around;
      font-weight: bold;
    }

    .game-card span {
      font-size: 18px;
    }

    .game-card a {
      text-decoration: none;
      background: #ffb703;
      color: #2b1709;
      padding: 9px 14px;
      border-radius: 10px;
      box-shadow: 0 4px 0 #b87900;
    }

    .game-card.locked {
      opacity: 0.5;
      filter: grayscale(1);
    }

    .game-card.locked a {
      pointer-events: none;
      background: #999;
      box-shadow: 0 4px 0 #666;
    }

    .books {
      position: absolute;
      right: 100px;
      display: flex;
      gap: 8px;
      z-index: 4;
    }

    .book {
      width: 28px;
      height: 70px;
      border-radius: 5px 5px 2px 2px;
      background: var(--color);
      border: 2px solid rgba(0,0,0,0.25);
    }

    #cat {
      position: absolute;
      left: 410px;
      top: 545px;
      font-size: 60px;
      z-index: 5;
      transition: top 1s ease;
      animation: catMove 0.8s infinite alternate;
    }

    @keyframes catMove {
      from {
        transform: rotate(-4deg);
      }
      to {
        transform: rotate(4deg);
      }
    }

    #yarn {
      position: absolute;
      top: 25px;
      left: 400px;
      font-size: 62px;
      z-index: 5;
      animation: bounce 1s infinite alternate;
    }

    @keyframes bounce {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-8px);
      }
    }

    #progress {
      font-size: 20px;
      font-weight: bold;
      margin-top: 8px;
    }

    #resetBtn {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #d62828;
      color: white;
      cursor: pointer;
      margin-bottom: 20px;
    }

    @media (max-width: 900px) {
      #library {
        width: 95vw;
      }
    }
  </style>
</head>

<body>

  <h1>🐱 Cat's Shelf Adventure</h1>

  <div id="story">
    Η γάτα θέλει να φτάσει το κουβάρι στο πάνω ράφι!
  </div>

  <div id="progress">Progress: 0 / 4</div>

  <div id="library">
    <div class="side left"></div>
    <div class="side right"></div>

    <div id="yarn">🧶</div>
    <div id="cat">🐱</div>

    <!-- Ράφι 4 -->
    <div class="shelf" style="top: 120px;"></div>
    <div class="game-card" id="level4" style="top: 48px;">
      <span>4. Cups Game</span>
      <a href="cups.html">Παίξε</a>
    </div>
    <div class="books" style="top: 45px;">
      <div class="book" style="--color:#e63946"></div>
      <div class="book" style="--color:#457b9d"></div>
      <div class="book" style="--color:#2a9d8f"></div>
    </div>

    <!-- Ράφι 3 -->
    <div class="shelf" style="top: 250px;"></div>
    <div class="game-card" id="level3" style="top: 178px;">
      <span>3. Jenga</span>
      <a href="jenga.html">Παίξε</a>
    </div>
    <div class="books" style="top: 175px;">
      <div class="book" style="--color:#ffb703"></div>
      <div class="book" style="--color:#8ecae6"></div>
      <div class="book" style="--color:#fb8500"></div>
    </div>

    <!-- Ράφι 2 -->
    <div class="shelf" style="top: 380px;"></div>
    <div class="game-card" id="level2" style="top: 308px;">
      <span>2. Ping Pong</span>
      <a href="pingpong.html">Παίξε</a>
    </div>
    <div class="books" style="top: 305px;">
      <div class="book" style="--color:#8338ec"></div>
      <div class="book" style="--color:#3a86ff"></div>
      <div class="book" style="--color:#ff006e"></div>
    </div>

    <!-- Ράφι 1 -->
    <div class="shelf" style="top: 510px;"></div>
    <div class="game-card" id="level1" style="top: 438px;">
      <span>1. Memory Game</span>
      <a href="memory.html">Παίξε</a>
    </div>
    <div class="books" style="top: 435px;">
      <div class="book" style="--color:#06d6a0"></div>
      <div class="book" style="--color:#118ab2"></div>
      <div class="book" style="--color:#ef476f"></div>
    </div>
  </div>

  <button id="resetBtn" onclick="resetProgress()">Reset Progress</button>

  <script>
    const cat = document.getElementById("cat");
    const progressText = document.getElementById("progress");

    const levels = [
      document.getElementById("level1"),
      document.getElementById("level2"),
      document.getElementById("level3"),
      document.getElementById("level4")
    ];

    const catPositions = [
      545,
      445,
      315,
      185,
      55
    ];

    function getProgress() {
      let progress = 0;

      if (localStorage.getItem("memoryWon") === "true") progress++;
      if (localStorage.getItem("pingpongWon") === "true") progress++;
      if (localStorage.getItem("jengaWon") === "true") progress++;
      if (localStorage.getItem("cupsWon") === "true") progress++;

      return progress;
    }

    function updateMenu() {
      const progress = getProgress();

      progressText.textContent = "Progress: " + progress + " / 4";
      cat.style.top = catPositions[progress] + "px";

      for (let i = 0; i < levels.length; i++) {
        if (i <= progress) {
          levels[i].classList.remove("locked");
        } else {
          levels[i].classList.add("locked");
        }
      }

      if (progress === 4) {
        progressText.textContent = "🎉 Η γάτα έφτασε το κουβάρι! Κέρδισες!";
      }
    }

    function resetProgress() {
      localStorage.removeItem("memoryWon");
      localStorage.removeItem("pingpongWon");
      localStorage.removeItem("jengaWon");
      localStorage.removeItem("cupsWon");
      updateMenu();
    }

    updateMenu();
  </script>

</body>
</html>
