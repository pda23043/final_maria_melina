<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Memory Game</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1d3557, #457b9d);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 25px;
    }

    .info {
      font-size: 20px;
      margin: 10px;
      font-weight: bold;
    }

    #game {
      width: 520px;
      margin: 25px auto;
      display: grid;
      grid-template-columns: repeat(4, 120px);
      gap: 12px;
      justify-content: center;
    }

    .card {
      width: 120px;
      height: 120px;
      background: #a8dadc;
      color: #1d3557;
      border-radius: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 45px;
      font-weight: bold;
      transition: all 0.3s ease;
      user-select: none;
      box-shadow: 0 8px 15px rgba(0,0,0,0.25);
    }

    .card:hover {
      transform: scale(1.05);
      background: #f1faee;
    }

    .card.flipped,
    .card.matched {
      background: white;
      color: #e63946;
      box-shadow: 0 0 15px rgba(255,255,255,0.9);
    }

    .card.matched {
      background: #ffd166;
      color: #1d3557;
      cursor: default;
    }

    button,
    a {
      display: inline-block;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #e63946;
      color: white;
      cursor: pointer;
      margin: 10px;
      text-decoration: none;
    }

    button:hover,
    a:hover {
      background: #ff4d5a;
    }

    @media (max-width: 600px) {
      #game {
        width: 360px;
        grid-template-columns: repeat(4, 80px);
        gap: 10px;
      }

      .card {
        width: 80px;
        height: 80px;
        font-size: 32px;
      }
    }
  </style>
</head>

<body>

  <h1>Memory Game</h1>

  <div class="info">Κινήσεις: <span id="moves">0</span></div>
  <div class="info" id="message">Βρες όλα τα ζευγάρια!</div>

  <div id="game"></div>

  <button onclick="restartGame()">Ξεκίνα ξανά</button>
  <a href="index.html">Πίσω στη βιβλιοθήκη</a>

  <script>
    const numbers = ["1", "2", "3", "4", "5", "6", "7", "8"];

    let cards = [];
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let moves = 0;
    let matchedPairs = 0;

    const game = document.getElementById("game");
    const movesText = document.getElementById("moves");
    const message = document.getElementById("message");

    function startGame() {
      game.innerHTML = "";

      moves = 0;
      matchedPairs = 0;
      firstCard = null;
      secondCard = null;
      lockBoard = false;

      movesText.textContent = moves;
      message.textContent = "Βρες όλα τα ζευγάρια!";

      cards = [...numbers, ...numbers];
      cards.sort(() => Math.random() - 0.5);

      cards.forEach(number => {
        const card = document.createElement("div");

        card.classList.add("card");
        card.dataset.value = number;
        card.textContent = "?";

        card.addEventListener("click", flipCard);

        game.appendChild(card);
      });
    }

    function flipCard() {
      if (lockBoard) return;
      if (this === firstCard) return;
      if (this.classList.contains("matched")) return;

      this.textContent = this.dataset.value;
      this.classList.add("flipped");

      if (!firstCard) {
        firstCard = this;
        return;
      }

      secondCard = this;
      moves++;
      movesText.textContent = moves;

      checkMatch();
    }

    function checkMatch() {
      if (firstCard.dataset.value === secondCard.dataset.value) {
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        matchedPairs++;

        resetCards();

        if (matchedPairs === numbers.length) {
          localStorage.setItem("memoryWon", "true");
          message.textContent = "Μπράβο! Κέρδισες το Memory Game!";
        }
      } else {
        lockBoard = true;

        setTimeout(() => {
          firstCard.textContent = "?";
          secondCard.textContent = "?";

          firstCard.classList.remove("flipped");
          secondCard.classList.remove("flipped");

          resetCards();
        }, 900);
      }
    }

    function resetCards() {
      firstCard = null;
      secondCard = null;
      lockBoard = false;
    }

    function restartGame() {
      startGame();
    }

    startGame();
  </script>

</body>
</html>
