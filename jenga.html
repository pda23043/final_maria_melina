<html>
<head>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
  <script src="https://gftruj.github.io/webzamples/aframe/controls/oculus-thumbstick-controls.js"></script>

  <script>
    var pp, c;

    let score = 0;
    let lives = 3;
    let targetColor = "";

    const colors = [
      { name: "RED", value: "#c1121f" },
      { name: "BLUE", value: "#1d4ed8" },
      { name: "GREEN", value: "#15803d" },
      { name: "YELLOW", value: "#facc15" }
    ];

    function updateUI() {
      document.querySelector("#infoText").setAttribute(
        "value",
        "TARGET: " + targetColor + "\nSCORE: " + score + "\nLIVES: " + lives
      );
    }

    function newTarget() {
      const random = colors[Math.floor(Math.random() * colors.length)];
      targetColor = random.name;
      updateUI();
    }

    function checkBlock(block) {
      if (lives <= 0) return;

      const blockColor = block.getAttribute("data-color");

      if (blockColor === targetColor) {
        score++;

        block.setAttribute("color", "#ffffff");
        block.setAttribute("opacity", "0.35");
        block.removeAttribute("moving");

        if (score >= 5) {
          localStorage.setItem("jengaWon", "true");

          document.querySelector("#infoText").setAttribute(
            "value",
            "WELL DONE!\nJENGA COMPLETED\nGO BACK TO LIBRARY"
          );

          return;
        }

        newTarget();
      } else {
        lives--;
        updateUI();

        if (lives <= 0) {
          document.querySelector("#infoText").setAttribute(
            "value",
            "GAME OVER\nFINAL SCORE: " + score
          );
        }
      }
    }

    AFRAME.registerComponent("moving", {
      init: function () {
        var el = this.el;

        el.addEventListener("mouseenter", function () {
          el.setAttribute("opacity", "0.9");
        });

        el.addEventListener("mouseleave", function () {
          el.setAttribute("opacity", "1");
        });

        el.addEventListener("mousedown", function () {
          checkBlock(el);

          el.setAttribute("grabbed", "");

          var xr = document.querySelector("a-scene").is("vr-mode");

          if (xr) {
            c = document.querySelector("a-cursor");
            c.setAttribute("visible", "true");
          } else {
            c = document.querySelector("[cursor]");
          }
        });

        el.addEventListener("mouseup", function () {
          el.removeAttribute("grabbed");
          pp = null;
        });
      },

      tick: function () {
        var el = this.el;

        if (el.getAttribute("grabbed") != null) {
          try {
            var pos = el.getAttribute("position");
            var p = c.components.raycaster.getIntersection(el).point;

            if (pp) {
              pos.x += p.x - pp.x;
              pos.y += p.y - pp.y;
              pos.z += p.z - pp.z;

              el.removeAttribute("dynamic-body");
              el.setAttribute("position", pos);
              el.setAttribute("dynamic-body", "");
            }

            pp = p;
          } catch {
            el.removeAttribute("grabbed");
            pp = null;
          }
        }
      }
    });
  </script>
</head>

<body>
  <a-scene
    id="s1"
    background="color: cadetblue"
    cursor="rayOrigin: mouse"
    physics="gravity: -1; iterations: 100; maxInterval: 0.01"
  >

    <a-plane
      static-body
      height="10"
      width="10"
      rotation="-90 0 0"
      color="#dddddd">
    </a-plane>

    <a-entity id="rig" position="0 -0.5 0.5">
      <a-camera
        position="0 1.5 0"
        wasd-controls="fly: true"
        look-controls="touchEnabled:false; magicWindowTrackingEnabled:false"
      >
        <a-text
          id="infoText"
          value="TARGET: \nSCORE: 0\nLIVES: 3"
          position="0 0.35 -1"
          align="center"
          width="1.6"
          color="white"
        ></a-text>
      </a-camera>

      <a-cursor
        raycaster="showLine: true; far: 3"
        oculus-touch-controls="hand: right"
        visible="false"
      ></a-cursor>

      <a-entity
        oculus-touch-controls="hand: left"
        oculus-thumbstick-controls
      ></a-entity>
    </a-entity>
  </a-scene>

  <a href="index.html" style="
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: #ffb703;
    color: black;
    padding: 12px 18px;
    border-radius: 10px;
    text-decoration: none;
    font-family: Arial;
    font-weight: bold;
    z-index: 999;
  ">
    Πίσω στη Βιβλιοθήκη
  </a>

  <script>
    var scene1 = document.getElementById("s1");

    for (var i = 0; i < 9; i++) {
      var e = i % 2;
      var o = !e;

      for (var j = 0; j < 5; j++) {
        var box = document.createElement("a-box");

        var randomColor = colors[Math.floor(Math.random() * colors.length)];

        box.setAttribute("dynamic-body", "");
        box.setAttribute("moving", "");
        box.setAttribute("data-color", randomColor.name);

        box.setAttribute(
          "position",
          e * (j - 2) / 10 + " " +
          (i + 1.5) / 10 + " " +
          (-12 - (j - 2) * o) / 10
        );

        box.setAttribute("color", randomColor.value);

        box.setAttribute(
          "scale",
          (4 * o + 1) / 10 + " 0.1 " + (4 * e + 1) / 10
        );

        scene1.appendChild(box);
      }
    }

    newTarget();
  </script>
</body>
</html>
